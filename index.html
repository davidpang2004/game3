const CHEERS=n=>[`Woohoo, ${n}! That's correct! Amazing job!`,`Yes! Great answer, ${n}! You're so smart!`,`Fantastic, ${n}! You got it right!`,`Awesome, ${n}! You're on fire!`,`Brilliant, ${n}! Keep it up!`];

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function fmtTime(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;}
function speak(text){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.rate=0.95;u.pitch=1.2;window.speechSynthesis.speak(u);}

function App(){
  const [phase,setPhase]=useState("start");
  const [nameInput,setNameInput]=useState("");
  const [playerName,setPlayerName]=useState("");
  const [ageGroup,setAgeGroup]=useState("");
  const [questions,setQuestions]=useState([]);
  const [roundIdx,setRoundIdx]=useState(0);
  const [score,setScore]=useState(0);
  const [selected,setSelected]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [feedbackMsg,setFeedbackMsg]=useState("");
  const [timer,setTimer]=useState(180);
  const timerRef=useRef(null);
  const current=questions[roundIdx]||null;

  const startGame=()=>{
    if(!ageGroup){alert("Please select an age group!");return;}
    const name=nameInput.trim()||"Player";
    setPlayerName(name);
    const q=shuffle(QUESTIONS[ageGroup]).slice(0,ROUND_TOTAL);
    setQuestions(q);
    setRoundIdx(0);setScore(0);
    setSelected(null);setAnswered(false);setFeedbackMsg("");
    setTimer(180);
    speak(`Let's go, ${name}! Good luck!`);
    setPhase("answer");
  };

  const exitGame=()=>{
    clearInterval(timerRef.current);
    window.speechSynthesis.cancel();
    setPhase("start");setNameInput("");setPlayerName("");setAgeGroup("");
  };

  useEffect(()=>{
    if(phase!=="answer")return;
    clearInterval(timerRef.current);
    timerRef.current=setInterval(()=>{
      setTimer(t=>{if(t<=1){clearInterval(timerRef.current);setAnswered(true);return 0;}return t-1;});
    },1000);
    return()=>clearInterval(timerRef.current);
  },[phase,roundIdx]);

  const selectChoice=(choice)=>{
    if(answered)return;
    clearInterval(timerRef.current);
    setSelected(choice);setAnswered(true);
    const correct=choice===current.a;
    if(correct) setScore(s=>s+current.pts);
    const msgs=correct?CHEERS(playerName):ENCOUR(playerName);
    const msg=msgs[Math.floor(Math.random()*msgs.length)];
    setFeedbackMsg(msg);speak(msg);
  };

  const nextRound=()=>{
    const next=roundIdx+1;
    setFeedbackMsg("");
    if(next>=ROUND_TOTAL){setPhase("result");}
    else{setRoundIdx(next);setSelected(null);setAnswered(false);setTimer(180);}
  };

  // ── Start ──
  if(phase==="start") return(
    <div style={{paddingTop:"1.5rem"}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:48,marginBottom:8}}>🧠</div>
        <h1 style={{fontSize:28,fontWeight:700,color:"#222"}}>Smart Brain</h1>
      </div>
      <div style={{marginBottom:16}}>
        <label style={{fontSize:14,color:"#555",display:"block",marginBottom:6}}>What's your name?</label>
        <input value={nameInput} onChange={e=>setNameInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&startGame()} placeholder="Enter your name…"/>
      </div>
      <div style={{marginBottom:24}}>
        <label style={{fontSize:14,color:"#555",display:"block",marginBottom:8}}>Select your age group:</label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          {AGE_GROUPS.map(g=>(
            <button key={g.id} className={`age-btn${ageGroup===g.id?" selected":""}`} onClick={()=>setAgeGroup(g.id)}>
              <div style={{fontSize:26,marginBottom:4}}>{g.emoji}</div>
              <div style={{fontSize:13,fontWeight:600,color:"#222"}}>{g.label}</div>
              <div style={{fontSize:11,color:"#888",marginTop:2}}>{g.desc}</div>
            </button>
          ))}
        </div>
      </div>
      <button onClick={startGame} style={{width:"100%",fontSize:15,padding:"12px",background:ageGroup?"#4a7fe5":"#ccc",color:"#fff",border:"none",borderRadius:12}}>
        Start game 🚀
      </button>
    </div>
  );

  // ── Answer ──
  if(phase==="answer"&&current) return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <span className="muted">Round {roundIdx+1}/{ROUND_TOTAL} · <span style={{color:DIFF_COLOR[current.diff],fontWeight:600,textTransform:"capitalize"}}>{current.diff}</span></span>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:13,fontWeight:600,color:timer<=10?"#D85A30":"#888"}}>{fmtTime(timer)}</span>
          <button onClick={exitGame} style={{fontSize:12,padding:"4px 10px",color:"#888"}}>✕ Exit</button>
        </div>
      </div>
      <div style={{fontSize:17,fontWeight:600,color:"#222",marginBottom:18,lineHeight:1.5}}>{current.q}</div>
      {current.choices.map((choice,i)=>{
        let bg="#fff",border="1px solid #ddd",op=1;
        if(answered){
          if(choice===current.a){bg="#e6f9f2";border="1px solid #1D9E75";}
          else if(choice===selected){bg="#fdecea";border="1px solid #D85A30";}
          else op=0.4;
        }
        return(
          <div key={i} onClick={()=>selectChoice(choice)}
            style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",marginBottom:8,borderRadius:12,border,background:bg,opacity:op,cursor:answered?"default":"pointer"}}>
            <span style={{minWidth:28,height:28,borderRadius:"50%",background:"#f0f0f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:600,color:"#555",flexShrink:0}}>{LABELS[i]}</span>
            <span style={{fontSize:15,color:"#222"}}>{choice}</span>
          </div>
        );
      })}
      {answered&&(
        <div style={{marginTop:16,textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:600,marginBottom:14,color:selected===current.a?"#1D9E75":"#D85A30"}}>{feedbackMsg}</div>
          <button onClick={nextRound} style={{fontSize:14,padding:"10px 24px"}}>
            {roundIdx+1<ROUND_TOTAL?"Next round ›":"See results ›"}
          </button>
        </div>
      )}
    </div>
  );

  // ── Result ──
  if(phase==="result"){
    const maxScore=ROUND_TOTAL*3;
    const pct=Math.round((score/maxScore)*100);
    const verdict=pct>=90?"Genius! 🏆":pct>=70?"Smart Brain! 🌟":pct>=50?"Good job! 👍":"Keep practising! 💪";
    return(
      <div style={{textAlign:"center",paddingTop:"1rem"}}>
        <div style={{fontSize:48,marginBottom:8}}>🧠</div>
        <h2 style={{fontSize:22,fontWeight:700,marginBottom:4,color:"#222"}}>{playerName}, {verdict}</h2>
        <p className="muted" style={{marginBottom:24}}>Here's how you did:</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:28}}>
          {[["Score",score],["Max possible",maxScore]].map(([l,v])=>(
            <div key={l} style={{background:"#f5f5f0",borderRadius:12,padding:"16px 8px"}}>
              <div className="muted" style={{marginBottom:4}}>{l}</div>
              <div style={{fontSize:30,fontWeight:700,color:"#222"}}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{background:"#eef3fd",borderRadius:12,padding:"14px",marginBottom:24}}>
          <div className="muted" style={{marginBottom:4}}>Accuracy</div>
          <div style={{fontSize:30,fontWeight:700,color:"#4a7fe5"}}>{pct}%</div>
        </div>
        <button onClick={()=>setPhase("start")} style={{fontSize:15,padding:"12px 32px",background:"#4a7fe5",color:"#fff",border:"none",borderRadius:12}}>Play again 🔄</button>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
